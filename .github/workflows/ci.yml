

name: My first CI/CD pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]

jobs:
  build-studybase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Install dependencies (workspace)
        run: npm ci

      - name: Install dependencies (shared)
        run: npm install --workspace=shared

      - name: Build shared
        run: npm run build --workspace=shared

      - name: Install backend dependencies
        run: npm install --workspace=backend

      - name: generate prisma client
        run: npm run prisma:generate --workspace=backend

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Install frontend dependencies
        run: npm install --workspace=frontend

      - name: Build frontend
        run: npm run build --workspace=frontend


  deploy-studybase:
    needs: build-studybase
    runs-on: ubuntu-latest
    steps:

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Pull latest changes on server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            cd /var/www/StudyBase
            git pull origin main
          EOF


      - name: Copy frontend env file to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -e

            cd /var/www/StudyBase/frontend

            cat > .env <<EOT
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}
            EOT
          EOF

      - name: Copy backend env file to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            
            cd /var/www/StudyBase/backend

            cat > .env <<EOT
            CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NODE_ENV=production
            PORT=${{ secrets.PORT }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            EOT
          EOF