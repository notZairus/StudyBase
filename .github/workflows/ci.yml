

name: My first CI/CD pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]

jobs:
  frontend: 
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build backend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps: 
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            \. "$HOME/.nvm/nvm.sh"
            rm -rf /var/www/StudyBase
            cd /var/www

            git clone git@github.com:notZairus/StudyBase.git

            cat > /var/www/StudyBase/frontend/.env << 'EOF'
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}
            EOF

            cat > /var/www/StudyBase/backend/.env << 'EOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=${{ secrets.PORT }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            EOF

            cd /var/www/StudyBase/backend
            npm install
            npm run build

            cd /var/www/StudyBase/backend
            npm install
            npx prisma generate
            npm run build 

            cd /var/www/StudyBase/frontend
            npm install
            npm run build

            pm2 restart backend




  

    

